<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Snap-It SAR</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C85A00">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/snapit/sw.js');
  }
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --orange: #C85A00;
  --orange-light: #F5EFE8;
  --bg: #F5F2EE;
  --surface: #FFFFFF;
  --border: #D8D0C8;
  --text: #1A1A1A;
  --muted: #7A7068;
  --green: #1A6B2A;
  --red: #8B1A1A;
}
html, body { height: 100%; }
body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); max-width: 420px; margin: 0 auto; min-height: 100vh; overflow-x: hidden; }

.topbar { background: var(--orange); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
.topbar-title { color: #fff; font-size: 17px; font-weight: 600; }
.topbar-back { color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; padding: 4px 8px 4px 0; display: none; }

.page { display: none; flex-direction: column; min-height: calc(100vh - 50px); }
.page.active { display: flex; }

/* PAGE 1 */
.tag-section { background: var(--surface); margin: 12px 12px 0; border-radius: 14px; border: 1px solid var(--border); padding: 16px; }
.tag-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 14px; }
.tag-display { display: flex; align-items: center; border-bottom: 2px solid var(--border); margin-bottom: 4px; padding-bottom: 6px; }
.tag-display-val { flex: 1; font-size: 26px; font-weight: 700; font-family: 'Courier New', monospace; letter-spacing: 2px; color: var(--orange); min-height: 38px; }
.tag-display-val.empty { color: #C0B8B0; font-size: 16px; font-weight: 400; font-family: -apple-system, sans-serif; letter-spacing: 0; line-height: 38px; }
.tag-search-btn { background: none; border: none; cursor: pointer; padding: 4px 0 4px 10px; }
.tag-search-btn svg { width: 28px; height: 28px; fill: var(--muted); }
.tag-search-btn.active svg { fill: var(--orange); }
.tag-hint { font-size: 11px; color: var(--muted); min-height: 16px; margin-bottom: 10px; }

.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 4px; }
.numpad-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 0; font-size: 22px; font-weight: 600; cursor: pointer; text-align: center; transition: background 0.1s; user-select: none; }
.numpad-btn:active { background: #E8DDD4; }
.numpad-btn.del { font-size: 18px; color: var(--muted); }
.numpad-btn.clr { font-size: 13px; color: var(--red); font-weight: 700; }

.scan-block { margin: 10px 12px 0; }
.or-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
.or-line { flex: 1; height: 1px; background: var(--border); }
.or-text { font-size: 13px; color: var(--muted); font-weight: 600; }
.scan-barcode-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 12px 12px; cursor: pointer; text-align: center; transition: background 0.1s; }
.scan-barcode-btn:active { background: var(--orange-light); }
.scan-lbl { font-size: 17px; font-weight: 700; color: var(--orange); margin-bottom: 8px; }
.barcode-img { width: 130px; height: 38px; }

/* PAGE 2 — full screen camera */
.cam-page { padding: 0; gap: 0; position: relative; height: 100vh; overflow: hidden; }
.video-box { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; }
.video-box video { width: 100%; height: 100%; object-fit: cover; }
.vid-placeholder { color: #888; font-size: 12px; text-align: center; letter-spacing: 1px; text-transform: uppercase; line-height: 2; position: absolute; }
.crosshair { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 2; }
.crosshair::before,.crosshair::after { content:''; position:absolute; background:rgba(200,90,0,0.7); }
.crosshair::before { width:30px; height:1.5px; top:0; left:-15px; }
.crosshair::after { width:1.5px; height:30px; top:-15px; left:0; }
.tap-indicator {
  position: fixed;
  width: 60px;
  height: 60px;
  border: 2px solid #f0a500;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 20;
  animation: tapFade 0.8s ease-out forwards;
}
@keyframes tapFade {
  0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1.6); }
}
.cam-res { position:absolute; top:12px; right:10px; font-size:10px; color:rgba(255,255,255,0.6); z-index:3; }
.cam-tag-badge { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.65); border-radius:6px; padding:4px 10px; font-size:13px; font-weight:700; color:#f0a500; font-family:'Courier New',monospace; letter-spacing:1px; z-index:3; }

/* Bottom overlay panel */
.cam-bottom { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; background: linear-gradient(transparent, rgba(0,0,0,0.85)); padding: 8px 12px 24px; display: flex; flex-direction: column; gap: 8px; }
.cam-bottom .shots-wrap { margin-bottom: 4px; }
.cam-btns { display:flex; gap:8px; }
.cam-btns .btn-ghost { flex:1; margin:0; padding: 18px; font-size:14px; font-weight:600; }
.cam-btns .btn-orange { flex:1; }
.btn { border-radius:10px; padding:13px 8px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:opacity 0.1s,transform 0.1s; text-align:center; }
.btn:active { transform:scale(0.97); opacity:0.85; }
.btn:disabled { opacity:0.3; cursor:not-allowed; transform:none; }
.btn-outline { flex:1; background:var(--bg); border:1.5px solid var(--border); color:var(--text); }
.btn-orange { flex:1; background:var(--orange); color:#fff; font-size:20px; font-weight:800; padding: 18px; border-radius:10px; border:none; cursor:pointer; }
.btn-green { width:100%; background:var(--green); color:#fff; font-size:15px; padding:14px; border-radius:10px; border:none; cursor:pointer; font-weight:700; }
.btn-green:disabled { opacity:0.3; cursor:not-allowed; }
.btn-ghost { width:100%; background:rgba(255,255,255,0.15); border:1.5px solid rgba(255,255,255,0.3); color:#fff; font-size:13px; padding:11px; border-radius:10px; cursor:pointer; border-style:solid; }

.shots-wrap { background:rgba(0,0,0,0.5); border-radius:10px; padding:8px 10px; display:none; }
.shots-head { font-size:11px; font-weight:700; color:rgba(255,255,255,0.7); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.shots-badge { background:var(--orange); color:#fff; border-radius:20px; font-size:11px; font-weight:700; padding:2px 9px; }
.shots-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.shot-card { position:relative; aspect-ratio:4/3; background:rgba(255,255,255,0.1); border-radius:6px; overflow:hidden; }
.shot-card img { width:100%; height:100%; object-fit:cover; display:block; }
.shot-lbl { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.65); padding:2px 3px; font-size:7px; color:#fff; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.shot-del { position:absolute; top:3px; right:3px; width:18px; height:18px; background:rgba(180,30,30,0.9); border:none; border-radius:50%; color:#fff; font-size:12px; line-height:18px; text-align:center; cursor:pointer; padding:0; font-weight:700; }

.log-box { display:none; }

/* SCAN OVERLAY */
.scan-overlay { display:none; position:fixed; inset:0; background:#000; z-index:100; flex-direction:column; }
.scan-overlay.active { display:flex; }
.scan-overlay video { width:100%; height:100%; object-fit:cover; }
.scan-overlay-top { position:absolute; top:0; left:0; right:0; background:rgba(0,0,0,0.7); padding:14px 16px; display:flex; align-items:center; gap:10px; }
.scan-cancel { color:#fff; font-size:15px; font-weight:600; cursor:pointer; padding:4px 10px 4px 0; }
.scan-overlay-title { color:#fff; font-size:16px; font-weight:600; }
.scan-frame { position:absolute; top:50%; left:50%; transform:translate(-50%,-60%); width:280px; height:100px; border:2px solid #C85A00; border-radius:8px; }
.scan-hint { position:absolute; bottom:80px; left:0; right:0; text-align:center; color:rgba(255,255,255,0.7); font-size:13px; }
canvas { display:none; }
</style>
</head>
<body>

<!-- BARCODE SCAN OVERLAY -->
<div class="scan-overlay" id="scanOverlay">
  <video id="scanVideo" autoplay playsinline muted></video>
  <div class="scan-overlay-top">
    <span class="scan-cancel" id="cancelScan">✕ Cancel</span>
    <span class="scan-overlay-title">Point at barcode</span>
  </div>

</div>

<div class="page active" id="page1">

</div>

<!-- PAGE 2: CAMERA -->
<div class="page cam-page" id="page2">
  <!-- Full screen video -->
  <div class="video-box" id="videoBox">
    <div class="vid-placeholder" id="vidPlaceholder">Starting camera…</div>
    <video id="camVideo" autoplay playsinline style="display:none"></video>

  <div class="cam-bottom">

<!-- CROP PREVIEW OVERLAY -->

  <div style="color:#f0a500;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;" id="cropLabel">Auto-cropped</div>
  <img id="cropImg" style="flex:1;max-width:100%;max-height:calc(100vh - 140px);object-fit:contain;border-radius:8px;"/>
  <div style="display:flex;gap:12px;width:100%;margin-top:12px;">
    <button id="cropRedo" style="flex:1;padding:16px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);color:#fff;font-size:14px;font-weight:600;border-radius:10px;cursor:pointer;">↺ Redo</button>
    <button id="cropAccept" style="flex:2;padding:16px;background:#C85A00;border:none;color:#fff;font-size:16px;font-weight:700;border-radius:10px;cursor:pointer;">✓ Use This</button>

<canvas id="canvas"></canvas>

<script>
const page1 = document.getElementById('page1');
const page2 = document.getElementById('page2');
const tagDisplay = document.getElementById('tagDisplay');
const tagHint = document.getElementById('tagHint');
const goToCamera = document.getElementById('goToCamera');
const camTagBadge = document.getElementById('camTagBadge');
const openBarcodeScanner = document.getElementById('openBarcodeScanner');
const scanOverlay = document.getElementById('scanOverlay');
const scanVideo = document.getElementById('scanVideo');
const cancelScan = document.getElementById('cancelScan');
const camVideo = document.getElementById('camVideo');
const vidPlaceholder = document.getElementById('vidPlaceholder');
const crosshair = document.getElementById('crosshair');
const camRes = document.getElementById('camRes');
const shootBtn = document.getElementById('shootBtn');
const newTagBtn = document.getElementById('newTagBtn');
const shotsWrap = document.getElementById('shotsWrap');
const shotsGrid = document.getElementById('shotsGrid');
const shotsBadge = document.getElementById('shotsBadge');
const log = document.getElementById('log');
const canvas = document.getElementById('canvas');

let tagRaw = '', tagFormatted = '', camStream = null, scanStream = null;
let facing = 'environment', shots = [];

function fmt(raw) {
  const d = raw.replace(/\D/g, '');
  return d ? '2-' + d.padStart(10, '0') : '';
}

function fname(tag, i) {
  return i === 0 ? tag + '.jpg' : tag + '.' + i + '.jpg';
}

function logMsg(msg, type) {
  const d = document.createElement('div');
  d.className = 'log-line' + (type ? ' ' + type : '');
  d.textContent = msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

// NUMPAD
document.querySelectorAll('.numpad-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const n = btn.dataset.n, a = btn.dataset.action;
    if (n !== undefined && tagRaw.length < 10) tagRaw += n;
    else if (a === 'del') tagRaw = tagRaw.slice(0, -1);
    else if (a === 'clr') tagRaw = '';
    updateTagDisplay();
  });
});

function updateTagDisplay() {
  tagFormatted = fmt(tagRaw);
  if (tagRaw) {
    tagDisplay.textContent = tagFormatted || tagRaw;
    tagDisplay.classList.remove('empty');
    tagHint.textContent = tagFormatted ? 'Tap search to open camera' : 'Keep typing…';
    goToCamera.classList.add('active');
  } else {
    tagDisplay.textContent = 'Type or scan…';
    tagDisplay.classList.add('empty');
    tagHint.textContent = 'Enter digits then tap search — or scan with Bluetooth scanner';
    goToCamera.classList.remove('active');
  }
}

goToCamera.addEventListener('click', () => {
  if (tagFormatted) showCameraPage();
});

// BLUETOOTH SCANNER — types digits fast then sends Enter
// We listen for keydown events on the page (scanner acts as keyboard)
let btBuffer = '', btTimer = null;

document.addEventListener('keydown', (e) => {
  // Only active on page 1
  if (!page1.classList.contains('active')) return;

  if (e.key >= '0' && e.key <= '9') {
    btBuffer += e.key;
    // Reset timeout — scanner sends all chars within ~100ms
    clearTimeout(btTimer);
    btTimer = setTimeout(() => { btBuffer = ''; }, 500);
  } else if (e.key === 'Enter') {
    clearTimeout(btTimer);
    if (btBuffer.length >= 3) {
      // Scanner fired — use buffered digits
      tagRaw = btBuffer.slice(-10);
      tagFormatted = fmt(tagRaw);
      btBuffer = '';
      updateTagDisplay();
      if (tagFormatted) {
        // Brief flash then jump to camera
        tagHint.textContent = '✓ Barcode read — opening camera…';
        setTimeout(() => showCameraPage(), 400);
      }
    } else if (tagFormatted) {
      // Manual entry + Enter key
      showCameraPage();
    }
    btBuffer = '';
  } else if (e.key === 'Backspace') {
    btBuffer = '';
    tagRaw = tagRaw.slice(0, -1);
    updateTagDisplay();
  }
});

// BARCODE SCANNER
openBarcodeScanner.addEventListener('click', async () => {
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    scanVideo.srcObject = scanStream;
    scanOverlay.classList.add('active');
    startZxing();
  } catch(e) {
    alert('Camera permission needed for scanning.');
  }
});

cancelScan.addEventListener('click', stopScan);

let scanRunning = false;

function stopScan() {
  scanRunning = false;
  if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
  scanOverlay.classList.remove('active');
}

async function startZxing() {
  if (!('BarcodeDetector' in window)) {
    stopScan();
    alert('Barcode scanning not supported on this browser. Use the numpad to enter the tag manually.');
    return;
  }
  const detector = new BarcodeDetector({ formats: ['code_128','code_39','ean_13','ean_8','upc_a','upc_e','itf','codabar'] });
  scanRunning = true;
  const sc = document.createElement('canvas');
  const ctx = sc.getContext('2d');
  async function tick() {
    if (!scanRunning) return;
    if (scanVideo.readyState === scanVideo.HAVE_ENOUGH_DATA) {
      sc.width = scanVideo.videoWidth;
      sc.height = scanVideo.videoHeight;
      ctx.drawImage(scanVideo, 0, 0);
      try {
        const results = await detector.detect(sc);
        if (results.length > 0) {
          const text = results[0].rawValue.replace(/\D/g, '');
          if (text) {
            tagRaw = text.slice(-10);
            tagFormatted = fmt(tagRaw);
            updateTagDisplay();
            stopScan();
            showCameraPage();
            return;
          }
        }
      } catch(e) {}
    }
    if (scanRunning) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// CAMERA PAGE
async function showCameraPage() {
  page1.classList.remove('active');
  page2.classList.add('active');
  camTagBadge.textContent = tagFormatted;
  await startCam();
}

async function startCam() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  vidPlaceholder.style.display = 'flex';
  camVideo.style.display = 'none';
  crosshair.style.display = 'none';
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width: { ideal: 3840 }, height: { ideal: 2160 } },
      audio: false
    });
    camVideo.srcObject = camStream;
    camVideo.style.display = 'block';
    vidPlaceholder.style.display = 'none';
    crosshair.style.display = 'block';
    shootBtn.disabled = false;
    const s = camStream.getVideoTracks()[0].getSettings();
    camRes.textContent = (s.width || '?') + '×' + (s.height || '?');
    logMsg('Camera ready · ' + (s.width || '?') + '×' + (s.height || '?'), 'hi');
  } catch(e) {
    logMsg('Camera error: ' + e.message, 'err');
    vidPlaceholder.textContent = 'Camera error — check permissions';
  }
}

function showTapIndicator(x, y) {
  const el = document.createElement('div');
  el.className = 'tap-indicator';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// TAP TO FOCUS
document.getElementById('videoBox').addEventListener('click', async (e) => {
  if (!camStream) return;
  const track = camStream.getVideoTracks()[0];
  const caps = track.getCapabilities ? track.getCapabilities() : {};

  // Calculate tap point as 0.0-1.0
  const rect = camVideo.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;

  // Show tap indicator
  showTapIndicator(e.clientX, e.clientY);

  const constraints = {};
  if (caps.focusMode && caps.focusMode.includes('manual')) {
    constraints.focusMode = 'manual';
    constraints.focusDistance = caps.focusDistance
      ? (caps.focusDistance.min + caps.focusDistance.max) / 2
      : undefined;
  } else if (caps.focusMode && caps.focusMode.includes('continuous')) {
    constraints.focusMode = 'continuous';
  }
  if (caps.pointsOfInterest) {
    constraints.pointsOfInterest = [{ x, y }];
    constraints.focusMode = constraints.focusMode || 'manual';
    constraints.exposureMode = caps.exposureMode?.includes('manual') ? 'manual' : 'continuous';
    constraints.whiteBalanceMode = caps.whiteBalanceMode?.includes('manual') ? 'manual' : 'continuous';
  }
  if (caps.exposureMode && caps.exposureMode.includes('continuous')) {
    constraints.exposureMode = 'continuous';
  }

  if (Object.keys(constraints).length > 0) {
    try {
      await track.applyConstraints({ advanced: [constraints] });
    } catch(e) {
      // Not supported on this device — silent fail
    }
  }
});

shootBtn.addEventListener('click', () => {
  if (!camStream) return;
  const s = camStream.getVideoTracks()[0].getSettings();
  const w = s.width || camVideo.videoWidth;
  const h = s.height || camVideo.videoHeight;
  canvas.width = w;
  canvas.height = h;
  canvas.getContext('2d').drawImage(camVideo, 0, 0, w, h);

  // Auto-crop then show preview
  const cropResult = autoCrop(canvas, w, h);
  showCropPreview(cropResult.blob, cropResult.cropped);
});

// AUTO CROP — find subject against white/light background
function autoCrop(srcCanvas, w, h) {
  const ctx = srcCanvas.getContext('2d');
  const data = ctx.getImageData(0, 0, w, h).data;
  const threshold = 220; // pixels brighter than this are "background"
  const pad = Math.round(Math.min(w, h) * 0.03); // 3% padding

  // Scan each edge to find where subject starts
  let top = 0, bottom = h - 1, left = 0, right = w - 1;

  // Find top
  outer: for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (data[i] < threshold || data[i+1] < threshold || data[i+2] < threshold) {
        top = y; break outer;
      }
    }
  }
  // Find bottom
  outer: for (let y = h - 1; y >= 0; y--) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (data[i] < threshold || data[i+1] < threshold || data[i+2] < threshold) {
        bottom = y; break outer;
      }
    }
  }
  // Find left
  outer: for (let x = 0; x < w; x++) {
    for (let y = 0; y < h; y++) {
      const i = (y * w + x) * 4;
      if (data[i] < threshold || data[i+1] < threshold || data[i+2] < threshold) {
        left = x; break outer;
      }
    }
  }
  // Find right
  outer: for (let x = w - 1; x >= 0; x--) {
    for (let y = 0; y < h; y++) {
      const i = (y * w + x) * 4;
      if (data[i] < threshold || data[i+1] < threshold || data[i+2] < threshold) {
        right = x; break outer;
      }
    }
  }

  // Add padding, clamp to image bounds
  top    = Math.max(0, top - pad);
  bottom = Math.min(h - 1, bottom + pad);
  left   = Math.max(0, left - pad);
  right  = Math.min(w - 1, right + pad);

  const cw = right - left;
  const ch = bottom - top;

  // If crop is tiny or basically the whole image, skip crop
  const cropped = cw > 50 && ch > 50 && (cw < w * 0.98 || ch < h * 0.98);

  const outCanvas = document.createElement('canvas');
  outCanvas.width = cw;
  outCanvas.height = ch;
  outCanvas.getContext('2d').drawImage(srcCanvas, left, top, cw, ch, 0, 0, cw, ch);

  let resultBlob;
  outCanvas.toBlob(b => { resultBlob = b; }, 'image/jpeg', 0.95);

  return { canvas: outCanvas, blob: resultBlob, cropped, left, top, cw, ch };
}

// CROP PREVIEW OVERLAY
let _pendingCrop = null;

function showCropPreview(blob, wasCropped) {
  // If crop failed to produce blob synchronously, use full image
  const preview = document.getElementById('cropPreview');
  const cropImg = document.getElementById('cropImg');
  const cropLabel = document.getElementById('cropLabel');

  // Get blob from canvas properly
  const outCanvas = document.createElement('canvas');
  // Re-run to get proper blob via callback
  const s2 = camStream ? camStream.getVideoTracks()[0].getSettings() : {};
  const w = s2.width || camVideo.videoWidth;
  const h = s2.height || camVideo.videoHeight;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = w; tempCanvas.height = h;
  tempCanvas.getContext('2d').drawImage(camVideo, 0, 0, w, h);
  const result = autoCropToBlob(tempCanvas, w, h);
  result.then(({ blob, cropped, cw, ch }) => {
    _pendingCrop = { blob, w: cw, h: ch };
    const url = URL.createObjectURL(blob);
    cropImg.src = url;
    cropLabel.textContent = cropped
      ? `Auto-cropped to ${cw}×${ch}` : `No crop needed (${w}×${h})`;
    preview.style.display = 'flex';
  });
}

async function autoCropToBlob(srcCanvas, w, h) {
  const ctx = srcCanvas.getContext('2d');
  const data = ctx.getImageData(0, 0, w, h).data;
  const threshold = 220;
  const pad = Math.round(Math.min(w, h) * 0.03);

  let top = 0, bottom = h - 1, left = 0, right = w - 1;

  outer1: for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    const i = (y * w + x) * 4;
    if (data[i] < threshold || data[i+1] < threshold || data[i+2] < threshold) { top = y; break outer1; }
  }
  outer2: for (let y = h-1; y >= 0; y--) for (let x = 0; x < w; x++) {
    const i = (y * w + x) * 4;
    if (data[i] < threshold || data[i+1] < threshold || data[i+2] < threshold) { bottom = y; break outer2; }
  }
  outer3: for (let x = 0; x < w; x++) for (let y = 0; y < h; y++) {
    const i = (y * w + x) * 4;
    if (data[i] < threshold || data[i+1] < threshold || data[i+2] < threshold) { left = x; break outer3; }
  }
  outer4: for (let x = w-1; x >= 0; x--) for (let y = 0; y < h; y++) {
    const i = (y * w + x) * 4;
    if (data[i] < threshold || data[i+1] < threshold || data[i+2] < threshold) { right = x; break outer4; }
  }

  top = Math.max(0, top - pad);
  bottom = Math.min(h-1, bottom + pad);
  left = Math.max(0, left - pad);
  right = Math.min(w-1, right + pad);

  const cw = right - left;
  const ch = bottom - top;
  const cropped = cw > 50 && ch > 50 && (cw < w * 0.98 || ch < h * 0.98);

  const out = document.createElement('canvas');
  out.width = cw; out.height = ch;
  out.getContext('2d').drawImage(srcCanvas, left, top, cw, ch, 0, 0, cw, ch);

  return new Promise(res => out.toBlob(b => res({ blob: b, cropped, cw, ch }), 'image/jpeg', 0.95));
}

// Accept crop
document.getElementById('cropAccept').addEventListener('click', () => {
  if (!_pendingCrop) return;
  const idx = shots.length;
  shots.push({ blob: _pendingCrop.blob, url: URL.createObjectURL(_pendingCrop.blob), w: _pendingCrop.w, h: _pendingCrop.h });
  renderShots();
  logMsg('Shot ' + (idx+1) + ' · ' + _pendingCrop.w + '×' + _pendingCrop.h + ' (cropped)', 'ok');
  document.getElementById('cropPreview').style.display = 'none';
  _pendingCrop = null;
});

// Redo — close preview, camera still live
document.getElementById('cropRedo').addEventListener('click', () => {
  document.getElementById('cropPreview').style.display = 'none';
  _pendingCrop = null;
});

function renderShots() {
  shotsGrid.innerHTML = '';
  shots.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'shot-card';
    const img = document.createElement('img');
    img.src = s.url;
    const lbl = document.createElement('div');
    lbl.className = 'shot-lbl';
    lbl.textContent = fname(tagFormatted, i);
    const del = document.createElement('button');
    del.className = 'shot-del';
    del.textContent = '×';
    del.onclick = () => {
      URL.revokeObjectURL(s.url);
      shots.splice(i, 1);
      renderShots();
    };
    card.append(img, lbl, del);
    shotsGrid.appendChild(card);
  });
  shotsWrap.style.display = shots.length ? 'block' : 'none';
  shotsBadge.textContent = shots.length;
}

newTagBtn.addEventListener('click', async () => {
  if (shots.length && tagFormatted) {
    for (let i = 0; i < shots.length; i++) {
      const n = fname(tagFormatted, i);
      const a = document.createElement('a');
      a.href = shots[i].url;
      a.download = n;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      await new Promise(r => setTimeout(r, 350));
    }
  }
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  shots.forEach(s => URL.revokeObjectURL(s.url));
  shots = [];
  tagRaw = '';
  tagFormatted = '';
  updateTagDisplay();
  renderShots();
  shootBtn.disabled = true;
  camRes.textContent = '';
  page2.classList.remove('active');
  page1.classList.add('active');
});
</script>
